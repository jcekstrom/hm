# Lima template for the jce NixOS dev VM
# Supports both x86_64 (built on ora) and aarch64 (built on Mac).
# Lima picks the correct image automatically based on the host machine's arch.
#
# Build images:
#   make build-lima-x86_64     (run on ora)
#   make build-lima-aarch64    (run on Mac)
#
# Start the VM:
#   make start-lima            (or: limactl start hosts/lima-vm/nixos.yaml --name nixos)
#
# Open a shell:
#   make shell-lima
#
# Rebuild NixOS inside the VM:
#   make rebuild-lima-x86_64   (if running x86_64 VM)
#   make rebuild-lima-aarch64  (if running aarch64 VM)

images:
  - location: "../../result/nixos-aarch64.qcow2"
    arch: "aarch64"
  - location: "../../result/nixos-x86_64.qcow2"
    arch: "x86_64"

vmType: "qemu"

# The username must match users.users.<name> declared in the NixOS config.
# lima-init will inject SSH keys and add this user to wheel at first boot.
user: "jce"

mounts:
  - location: "~"
    writable: false
    9p:
      # "mmap" is more stable than the default "fscache" on NixOS
      cache: "mmap"
  - location: "/tmp/lima"
    writable: true
    9p:
      cache: "mmap"

memory: "8GiB"

portForwards:
  # NixOS-specific: prevent Lima from intercepting host DHCP packets on UDP/68.
  # Without this, DHCP on the host can be disrupted.
  # See: https://github.com/nixos-lima/nixos-lima/issues/50
  - proto: udp
    guestPort: 68
    guestIP: "0.0.0.0"
    ignore: true

containerd:
  system: false
  user: false
